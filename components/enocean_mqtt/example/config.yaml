esphome:
  name: enocean-gateway
  platform: ESP32
  board: esp32dev

wifi:
  ssid: "MeinWLAN"
  password: "MeinPasswort"

mqtt:
  id: mqtt_client
  broker: 192.168.1.10
  port: 1883
  username: "mqtt_user"
  password: "mqtt_pass"

uart:
  id: uart_enocean
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 57600

external_components:
  - source:
      type: local
      path: components

enocean_mqtt:
  id: enocean
  mqtt_id: mqtt_client
  uart_id: uart_enocean
  main_topic: "enocean"
  debug_raw: true
  known_devices:
    - device_id: "AABB1122"
      name: "Fensterkontakt Wohnzimmer"
      eep: "D5-00-01"
    - device_id: "CCDD3344"
      name: "Thermostat Schlafzimmer"
      eep: "A5-20-06"
    - device_id: "EEFF5566"
      name: "Wandschalter Flur"
      eep: "F6-02-01"
    - device_id: "11223344"
      name: "Fensterklinke Bad"
      eep: "F6-10-00"
    - device_id: "55667788"
      name: "CO2 Sensor Büro"
      eep: "A5-09-04"
